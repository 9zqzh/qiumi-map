<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>秋米小地图</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
<style>
:root { color-scheme: light; }
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --paper: #F5EDE3; --ink: #2C1810; --clay: #CC7540; --sage: #7C9A6B;
  --blush: #F0C0B0; --sky: #7BA8C0; --wheat: #E8D5B7; --cream: #FAF5EE;
  --ember: #D4644A; --siamese: #8B5E3C;
  --shadow-warm: 0 4px 16px rgba(44,24,16,0.12); --shadow-card: 0 2px 12px rgba(44,24,16,0.08);
  --radius: 18px; --font-display: 'ZCOOL KuaiLe', cursive; --font-body: 'Nunito', sans-serif;
}
@keyframes fadeInUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
@keyframes popIn { 0% { transform:scale(0.8); opacity:0; } 70% { transform:scale(1.05); } 100% { transform:scale(1); opacity:1; } }
@keyframes pulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.04); } }

body {
  font-family:var(--font-body); background:var(--cream); color:var(--ink);
  height:100vh; width:100vw; overflow:hidden; -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent; touch-action:manipulation;
}

/* ── Welcome ── */
.welcome-overlay {
  position:fixed; inset:0; z-index:9999; background:linear-gradient(180deg, #FDF5E6 0%, #FAF0E6 40%, #F5EDE3 100%);
  display:flex; align-items:center; justify-content:center; flex-direction:column; gap:20px;
  transition:opacity 0.4s ease, visibility 0.4s ease; overflow-y:auto; padding:40px 20px;
}
.welcome-overlay.hidden { opacity:0; visibility:hidden; pointer-events:none; }
.w-logo-wrap { display:flex; align-items:center; gap:12px; animation:fadeInUp 0.5s ease; }
.w-logo-text { font-family:var(--font-display); font-size:42px; color:var(--clay); }
.w-subtitle { font-size:15px; color:var(--siamese); opacity:0.7; letter-spacing:1px; }
.w-city-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; max-width:420px; width:100%; }
.w-city-btn {
  padding:16px 12px; border-radius:var(--radius); border:2.5px dashed var(--clay);
  background:var(--paper); color:var(--ink); font-family:var(--font-display);
  font-size:18px; cursor:pointer; transition:all 0.25s ease; position:relative;
  text-align:center; user-select:none;
}
.w-city-btn:hover { background:var(--clay); color:#fff; border-style:solid; transform:translateY(-3px); box-shadow:var(--shadow-warm); }
.w-city-btn:active { transform:scale(0.95); }
.w-city-btn .del {
  position:absolute; top:-8px; right:-8px; width:22px; height:22px; border-radius:50%;
  background:var(--ember); color:#fff; border:2px solid var(--paper); font-size:11px;
  display:none; align-items:center; justify-content:center; cursor:pointer; z-index:2; line-height:1;
}
.w-city-btn:hover .del { display:flex; }
.w-divider { display:flex; align-items:center; gap:10px; max-width:360px; width:100%; }
.w-divider::before, .w-divider::after { content:''; flex:1; height:1.5px; background:var(--wheat); border-radius:1px; }
.w-divider span { font-size:12px; color:var(--siamese); opacity:0.5; white-space:nowrap; }
.w-custom-row { display:flex; gap:8px; max-width:360px; width:100%; }
.w-city-input {
  flex:1; padding:14px 18px; border-radius:50px; border:2.5px dashed var(--sky);
  background:var(--cream); font-family:var(--font-display); font-size:18px;
  text-align:center; outline:none; color:var(--ink); min-width:0;
}
.w-city-input:focus { border-color:var(--clay); border-style:solid; }
.w-city-input::placeholder { color:#C4B8A8; font-size:15px; }
.w-go-btn {
  padding:14px 28px; border-radius:50px; border:none; background:var(--clay);
  color:#fff; font-family:var(--font-display); font-size:20px; cursor:pointer;
  transition:all 0.25s ease; box-shadow:0 4px 14px rgba(204,117,64,0.3); white-space:nowrap;
}
.w-go-btn:hover { background:var(--ember); }
.w-go-btn:active { transform:scale(0.95); }
.w-go-btn:disabled { opacity:0.5; cursor:not-allowed; }

/* ── App Container ── */
.app-container { display:none; width:100%; height:100%; position:relative; }
.app-container.visible { display:block; }
#amap { width:100%; height:100%; }

/* ── Top Bar ── */
.top-bar {
  position:fixed; top:max(12px, env(safe-area-inset-top, 12px)); left:50%; transform:translateX(-50%);
  z-index:1000; display:flex; gap:8px; align-items:center;
  background:rgba(253,245,230,0.94); backdrop-filter:blur(20px);
  border:2px solid var(--wheat); border-radius:50px; padding:8px 14px;
  box-shadow:var(--shadow-warm); max-width:calc(100vw - 16px);
}
.top-logo {
  font-family:var(--font-display); font-size:20px; color:var(--clay);
  white-space:nowrap; cursor:pointer; user-select:none;
  display:flex; align-items:center; gap:6px; flex-shrink:0;
}
.search-wrap { position:relative; display:flex; align-items:center; flex:1; min-width:0; }
.search-input {
  width:100%; padding:10px 36px 10px 16px; border-radius:50px;
  border:2px solid var(--wheat); background:var(--cream); font-family:var(--font-body);
  font-size:14px; color:var(--ink); outline:none; transition:all 0.3s ease;
}
.search-input:focus { border-color:var(--clay); }
.search-input::placeholder { color:#C4B8A8; font-style:italic; }
.search-clear { position:absolute; right:36px; font-size:14px; color:var(--wheat); cursor:pointer; display:none; }
.search-clear.visible { display:block; }
.search-icon-btn { position:absolute; right:10px; font-size:16px; color:var(--clay); cursor:pointer; background:none; border:none; padding:4px; }
.search-results {
  display:none; position:absolute; top:calc(100% + 8px); left:0; right:0;
  background:var(--cream); border:2px solid var(--wheat); border-radius:var(--radius);
  max-height:340px; overflow-y:auto; box-shadow:0 12px 36px rgba(44,24,16,0.2); z-index:1001;
}
.search-results.active { display:block; animation:fadeInUp 0.2s ease; }
.search-item {
  padding:12px 16px; cursor:pointer; border-bottom:1px dashed var(--wheat);
  transition:background 0.15s ease; font-size:13px; color:var(--ink); display:flex; align-items:center; gap:10px;
}
.search-item:last-child { border-bottom:none; }
.search-item:hover { background:var(--blush); }
.search-item .s-icon { font-size:20px; flex-shrink:0; }
.search-item .s-info { flex:1; min-width:0; }
.search-item .s-name { font-weight:700; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.search-item .s-addr { font-size:11px; opacity:0.5; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px; }
.search-loading { padding:20px; text-align:center; opacity:0.5; font-size:13px; }
.top-actions { display:flex; gap:4px; flex-shrink:0; }
.top-btn {
  width:38px; height:38px; border-radius:50%; border:2px solid var(--wheat);
  background:var(--cream); cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:all 0.2s ease; font-size:17px; color:var(--ink); position:relative;
}
.top-btn:hover { background:var(--clay); color:#fff; border-color:var(--clay); }
.top-btn.active { background:var(--sage); color:#fff; border-color:var(--sage); }
.top-btn .tt {
  display:none; position:absolute; bottom:-28px; left:50%; transform:translateX(-50%);
  background:var(--ink); color:var(--cream); font-size:11px; padding:3px 10px; border-radius:8px;
  white-space:nowrap; pointer-events:none;
}
.top-btn:hover .tt { display:block; }

/* ── City Bar ── */
.city-bar {
  position:fixed; top:calc(max(12px, env(safe-area-inset-top, 12px)) + 56px); left:0; right:0;
  z-index:999; display:flex; gap:6px; padding:0 16px; overflow-x:auto;
  scrollbar-width:none; justify-content:center; flex-wrap:wrap; pointer-events:none;
}
.city-bar > * { pointer-events:auto; }
.city-bar::-webkit-scrollbar { display:none; }
.city-pill {
  padding:6px 16px; border-radius:50px; border:2px solid var(--wheat);
  background:rgba(253,245,230,0.88); backdrop-filter:blur(10px); font-family:var(--font-display);
  font-size:16px; color:var(--ink); cursor:pointer; transition:all 0.2s ease;
  white-space:nowrap; position:relative; flex-shrink:0; user-select:none;
}
.city-pill:hover { border-color:var(--clay); background:var(--blush); }
.city-pill.active { background:var(--clay); color:#fff; border-color:var(--clay); box-shadow:0 3px 12px rgba(204,117,64,0.25); }
.city-pill .cp-del {
  position:absolute; top:-8px; right:-8px; width:20px; height:20px; border-radius:50%;
  background:var(--ember); color:#fff; border:2px solid var(--paper); font-size:10px;
  display:none; align-items:center; justify-content:center; cursor:pointer; z-index:2;
}
.city-pill:hover .cp-del, .city-pill.active .cp-del { display:flex; }
.city-pill.cp-add { border-style:dashed; color:var(--sky); font-size:14px; font-family:var(--font-body); }

/* ── Panels ── */
.route-panel {
  position:fixed; top:calc(max(12px, env(safe-area-inset-top, 12px)) + 96px); right:12px; z-index:950;
  background:rgba(253,245,230,0.93); backdrop-filter:blur(16px); border:2px solid var(--wheat);
  border-radius:var(--radius); padding:14px; max-width:200px;
  box-shadow:var(--shadow-card); display:none; max-height:50vh; overflow-y:auto;
}
.route-panel.visible { display:block; animation:fadeInUp 0.25s ease; }
.route-panel-title { font-family:var(--font-display); font-size:16px; color:var(--sage); margin-bottom:8px; }
.route-panel-list { max-height:180px; overflow-y:auto; font-size:12px; }
.route-panel-item { padding:4px 0; color:var(--ink); border-bottom:1px dotted var(--wheat); cursor:pointer; display:flex; align-items:center; gap:6px; }
.route-mode-tabs { display:flex; gap:4px; margin-bottom:8px; }
.route-mode-tab {
  flex:1; padding:4px 8px; border-radius:12px; border:1.5px solid var(--wheat);
  background:var(--cream); font-size:11px; cursor:pointer; text-align:center;
}
.route-mode-tab.active { background:var(--sage); color:#fff; border-color:var(--sage); }
.route-btn {
  width:100%; padding:8px; border-radius:20px; border:none; font-size:12px; cursor:pointer; font-weight:600; margin-top:4px;
}
.route-btn.plan { background:var(--sage); color:#fff; }
.route-btn.clear { background:transparent; color:var(--ember); border:2px dashed var(--ember); }

.data-panel {
  position:fixed; top:calc(max(12px, env(safe-area-inset-top, 12px)) + 96px); left:12px; z-index:950;
  background:rgba(253,245,230,0.93); backdrop-filter:blur(16px); border:2px solid var(--wheat);
  border-radius:var(--radius); padding:10px; box-shadow:var(--shadow-card); display:none; flex-direction:column; gap:6px;
}
.data-panel.visible { display:flex; animation:fadeInUp 0.25s ease; }
.data-btn {
  padding:8px 14px; border-radius:20px; border:2px solid var(--wheat); background:var(--cream);
  font-size:12px; cursor:pointer; color:var(--ink); text-align:left; white-space:nowrap; font-weight:500;
}
.data-btn:hover { border-color:var(--clay); background:var(--blush); }
.data-btn.danger { color:var(--ember); border-color:transparent; }
.data-btn.danger:hover { background:var(--ember); color:#fff; border-color:var(--ember); }

/* ── Bottom Sheet ── */
.bottom-sheet {
  position:fixed; bottom:0; left:0; right:0; z-index:900;
  background:var(--cream); border-radius:28px 28px 0 0;
  box-shadow:0 -4px 30px rgba(44,24,16,0.15); border-top:3px solid var(--wheat);
  max-height:58vh; display:flex; flex-direction:column;
  transition:transform 0.35s cubic-bezier(0.25,0.1,0.25,1);
  padding-bottom:env(safe-area-inset-bottom, 0);
}
.bottom-sheet.collapsed { transform:translateY(calc(100% - 56px)); }
.sheet-handle {
  height:48px; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0;
}
.sheet-handle-line { width:48px; height:5px; border-radius:10px; background:var(--wheat); }
.sheet-header { display:flex; align-items:center; justify-content:space-between; padding:0 20px 10px; flex-shrink:0; }
.sheet-title { font-family:var(--font-display); font-size:20px; color:var(--clay); }
.sheet-count { font-size:13px; opacity:0.5; }
.cat-filters { display:flex; gap:6px; flex-wrap:wrap; padding:0 20px 12px; }
.cat-pill {
  padding:5px 12px; border-radius:50px; border:2px solid var(--wheat);
  background:var(--paper); font-size:12px; cursor:pointer; transition:all 0.15s ease; font-weight:500;
}
.cat-pill:hover { border-color:var(--clay); }
.cat-pill.active { background:var(--clay); color:#fff; border-color:var(--clay); }
.sheet-content { flex:1; overflow-y:auto; padding:0 20px 20px; -webkit-overflow-scrolling:touch; }
.marker-card {
  background:var(--paper); border:2px solid var(--wheat); border-radius:var(--radius);
  padding:12px 14px; margin-bottom:8px; cursor:pointer; transition:all 0.2s ease;
  display:flex; align-items:center; gap:10px;
}
.marker-card:hover { border-color:var(--clay); box-shadow:var(--shadow-card); transform:translateX(4px); }
.marker-card .mc-icon { font-size:24px; width:40px; height:40px; display:flex; align-items:center; justify-content:center; background:var(--cream); border-radius:50%; border:2px dashed var(--wheat); flex-shrink:0; }
.marker-card .mc-info { flex:1; min-width:0; }
.marker-card .mc-name { font-weight:700; font-size:14px; color:var(--ink); }
.marker-card .mc-addr { font-size:11px; opacity:0.5; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.mc-btn {
  width:30px; height:30px; border-radius:50%; border:1.5px solid var(--wheat);
  background:var(--cream); cursor:pointer; font-size:12px; display:flex; align-items:center; justify-content:center;
}
.mc-btn:hover { background:var(--ink); color:var(--cream); border-color:var(--ink); }
.mc-btn.danger:hover { background:var(--ember); border-color:var(--ember); color:#fff; }
.empty-state { text-align:center; padding:36px 20px; opacity:0.4; }
.empty-state-icon { font-size:40px; margin-bottom:8px; }
.empty-state-text { font-size:14px; font-style:italic; line-height:1.6; }

/* ── Modals ── */
.modal-overlay {
  position:fixed; inset:0; z-index:2000; background:rgba(44,24,16,0.35);
  backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center;
  padding:20px;
}
.modal-card {
  background:var(--paper); border:3px solid var(--wheat); border-radius:var(--radius);
  padding:24px; width:90%; max-width:440px; box-shadow:0 20px 60px rgba(44,24,16,0.25);
  max-height:85vh; overflow-y:auto; animation:popIn 0.3s ease;
}
.modal-title { font-family:var(--font-display); font-size:24px; color:var(--clay); margin-bottom:16px; text-align:center; }
.modal-field { margin-bottom:12px; }
.modal-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; color:var(--siamese); opacity:0.6; margin-bottom:4px; }
.modal-input, .modal-textarea, .modal-select {
  width:100%; padding:10px 14px; border-radius:12px; border:2px solid var(--wheat);
  background:var(--cream); font-size:14px; color:var(--ink); outline:none;
}
.modal-input:focus, .modal-textarea:focus, .modal-select:focus { border-color:var(--clay); }
.modal-textarea { resize:vertical; min-height:60px; }
.modal-textarea.code-area { font-family:monospace; font-size:11px; word-break:break-all; min-height:100px; }
.modal-row { display:flex; gap:10px; }
.modal-row .modal-field { flex:1; }
.color-picker-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.color-dot {
  width:30px; height:30px; border-radius:50%; cursor:pointer; border:3px solid transparent;
  transition:all 0.15s ease; box-shadow:0 2px 6px rgba(0,0,0,0.12);
}
.color-dot:hover { transform:scale(1.2); }
.color-dot.selected { border-color:var(--ink); box-shadow:0 0 0 3px var(--clay); }
input[type="range"] { width:100%; accent-color:var(--clay); }
.modal-btns { display:flex; gap:10px; margin-top:8px; }
.modal-btn {
  flex:1; padding:12px; border-radius:50px; border:none; font-family:var(--font-display);
  font-size:18px; cursor:pointer;
}
.modal-btn:active { transform:scale(0.95); }
.modal-btn.primary { background:var(--clay); color:#fff; }
.modal-btn.primary:hover { background:var(--ember); }
.modal-btn.secondary { background:var(--cream); color:var(--ink); border:2px solid var(--wheat); }
.modal-btn.danger { flex:0 0 auto; background:transparent; color:var(--ember); border:2px dashed var(--ember); font-size:14px; padding:8px 16px; }
.modal-btn.danger:hover { background:var(--ember); color:#fff; border-style:solid; }
.modal-check-row { display:flex; align-items:center; gap:8px; margin-top:8px; }

.toast-container { position:fixed; bottom:100px; left:50%; transform:translateX(-50%); z-index:3000; display:flex; flex-direction:column; gap:8px; align-items:center; pointer-events:none; }
.toast {
  background:var(--ink); color:var(--cream); padding:10px 24px; border-radius:50px;
  font-size:13px; box-shadow:0 4px 16px rgba(44,24,16,0.3);
  animation:fadeInUp 0.3s ease; pointer-events:auto;
}
.toast.fade-out { opacity:0; }

.sync-dot { width:8px; height:8px; border-radius:50%; background:var(--sage); position:absolute; top:6px; right:6px; }
.sync-dot.syncing { background:var(--sky); animation:pulse 0.8s ease infinite; }
.sync-dot.error { background:var(--ember); }

.route-info-bar {
  position:fixed; bottom:100px; left:50%; transform:translateX(-50%); z-index:1000;
  background:var(--paper); border:2px solid var(--sage); border-radius:50px;
  padding:8px 20px; font-size:13px; color:var(--ink); box-shadow:var(--shadow-card);
  display:none; white-space:nowrap;
}
.route-info-bar.visible { display:block; animation:fadeInUp 0.3s ease; }

.marker-wrap {
  display:flex; flex-direction:column; align-items:center; cursor:pointer;
  filter:drop-shadow(2px 3px 3px rgba(44,24,16,0.35)); transition:filter 0.2s, transform 0.2s;
  transform:translate(-50%, 0);
}
.marker-wrap:hover { filter:drop-shadow(2px 3px 6px rgba(44,24,16,0.5)); transform:translate(-50%, -2px); }
.marker-wrap .mk-dot {
  width:14px; height:14px; border-radius:50%; border:3px solid #fff;
  box-shadow:0 2px 6px rgba(44,24,16,0.25); margin-bottom:2px; flex-shrink:0;
}
.marker-wrap .mk-label {
  font-family:var(--font-display); line-height:1.3; text-align:center;
  padding:2px 8px; border-radius:6px; max-width:130px;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}

@media (max-width:640px) {
  .w-logo-text { font-size:32px; }
  .w-city-grid { grid-template-columns:repeat(2,1fr); gap:10px; max-width:320px; }
  .w-city-btn { font-size:16px; padding:14px 10px; }
  .top-bar { padding:6px 10px; gap:6px; top:max(8px, env(safe-area-inset-top, 8px)); }
  .top-logo { font-size:16px; }
  .search-input { font-size:13px; padding:8px 32px 8px 14px; }
  .top-btn { width:34px; height:34px; font-size:15px; }
  .city-bar { top:calc(max(8px, env(safe-area-inset-top, 8px)) + 50px); }
  .route-panel { top:calc(max(8px, env(safe-area-inset-top, 8px)) + 90px); right:4px; max-width:160px; }
  .data-panel { top:calc(max(8px, env(safe-area-inset-top, 8px)) + 90px); left:4px; }
  .bottom-sheet { max-height:65vh; }
  .bottom-sheet.collapsed { transform:translateY(calc(100% - 50px)); }
  .sheet-handle { height:42px; }
  .modal-card { width:95%; padding:18px; }
  .modal-title { font-size:20px; }
  .marker-wrap .mk-label { max-width:80px; font-size:11px !important; }
}
</style>
</head>
<body>

<div class="welcome-overlay" id="welcome">
  <div class="w-logo-wrap">

<script>
(function(){
'use strict';

var SUPABASE_URL = 'https://dffkwjapxglxtvtouddi.supabase.co';
var SUPABASE_KEY = 'sb_publishable_zYc91ptjzH5dWMpZTZrUlA_KnrJPueY';
var LS_KEY = 'qiumi_v2_local';
var LS_CITY = 'qiumi_v2_current';

var CATS = [
  { id:'restaurant', name:'🍜 餐厅', emoji:'🍜' }, { id:'cafe', name:'☕ 咖啡', emoji:'☕' },
  { id:'bakery', name:'🥐 面包', emoji:'🥐' }, { id:'bar', name:'🍸 酒馆', emoji:'🍸' },

  { id:'sight', name:'🏛️ 景点', emoji:'🏛️' }, { id:'shop', name:'🛍️ 小店', emoji:'🛍️' },

];
var COLORS = ['#2C1810','#CC7540','#D4644A','#7C9A6B','#4A7C96','#8E6B5A','#E06070','#5080C0','#C09040','#5C8C6C','#9070B0','#3C3C3C'];
var DEF_CITIES = [

  { name:'成都', lat:30.5728, lng:104.0668, zoom:12 },

  { name:'广州', lat:23.1291, lng:113.2644, zoom:12 },
  { name:'深圳', lat:22.5431, lng:114.0579, zoom:12 }
];

var supabase = null, supabaseReady = false;
var amap = null, placeSearch = null, geocoder = null;
var currentCity = null;
var markersData = [], userCities = [];
var routeStops = [], routeMode = 'driving', isRouteMode = false;
var activeFilter = 'all', sheetExpanded = false;
var cityPolygon = null, routePolyline = null, routeMarkers = [], mapMarkers = {};
var currentInfoWin = null, pendingSync = {};

function guid() { return 'm_' + Date.now(36) + '_' + Math.random().toString(36).slice(2,8); }
function esc(s) { var d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function getCat(id) { for(var i=0;i<CATS.length;i++){if(CATS[i].id===id)return CATS[i];} return CATS[CATS.length-1]; }
function gm(id) { for(var i=0;i<markersData.length;i++){if(markersData[i].id===id)return markersData[i];} return null; }
function getCityMarkers() { if(!currentCity)return[]; return markersData.filter(function(m){return m.city===currentCity.name;}); }

function toast(msg) {
  var c=document.getElementById('toastContainer');
  var t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  c.appendChild(t); setTimeout(function(){t.classList.add('fade-out');setTimeout(function(){t.remove();},300);},2200);
}

function saveLocal() {
  try { localStorage.setItem(LS_KEY, JSON.stringify({markers:markersData, cities:userCities})); if(currentCity) localStorage.setItem(LS_CITY, JSON.stringify(currentCity)); } catch(e){}
}
function loadLocal() {
  try {
    var raw=localStorage.getItem(LS_KEY); if(raw){var d=JSON.parse(raw); if(d.markers)markersData=d.markers; if(d.cities&&d.cities.length>0)userCities=d.cities;}
    if(userCities.length===0) userCities=DEF_CITIES.map(function(c){return {name:c.name,lat:c.lat,lng:c.lng,zoom:c.zoom};});
    var cc=localStorage.getItem(LS_CITY); if(cc) currentCity=JSON.parse(cc);
  } catch(e){ userCities=DEF_CITIES.map(function(c){return {name:c.name,lat:c.lat,lng:c.lng,zoom:c.zoom};}); }
}

function getUniqueCities() {
  var seen={}, all=[];
  for(var i=0;i<userCities.length;i++){ var c=userCities[i]; if(!seen[c.name]){all.push(c); seen[c.name]=true;} }
  for(var i=0;i<markersData.length;i++){ var m=markersData[i]; if(!seen[m.city]){all.push({name:m.city,lat:m.lat,lng:m.lng,zoom:12}); seen[m.city]=true;} }
  if(currentCity&&!seen[currentCity.name]){all.push(currentCity); seen[currentCity.name]=true;}
  return all;
}

// ═══ MAP ═══
function initAmap(lat, lng, zoom) {
  if(amap){ amap.destroy(); amap=null; mapMarkers={}; }
  amap = new AMap.Map('amap', {
    center:[lng, lat], zoom:zoom||12, resizeEnable:true,
    zoomEnable:true, dragEnable:true, doubleClickZoom:true,
    scrollWheel:true, touchZoom:true, mapStyle:'amap://styles/light'
  });
  amap.on('click', function(e){
    if(amap._pendingAdd){ amap._pendingAdd=false; showAddModal(e.lnglat.lat, e.lnglat.lng, '', ''); }
  });
  placeSearch = new AMap.PlaceSearch({ map:amap, pageSize:10, citylimit:true, extensions:'all', autoFitView:false });
  geocoder = new AMap.Geocoder({ citylimit:true });
}

function enterCity(name, lat, lng, zoom) {
  currentCity = { name:name, lat:lat, lng:lng, zoom:zoom||12 };
  saveLocal();
  initAmap(lat, lng, zoom||12);
  renderMarkers(); updateSheet(); updateCityBar(); updateRoutePanel(); clearRouteLine();
  drawCityBoundary(name);
  sheetExpanded=false; document.getElementById('bottomSheet').classList.add('collapsed');
  for(var i=0;i<userCities.length;i++){ if(userCities[i].name===name) return; }
  userCities.push({name:name, lat:lat, lng:lng, zoom:zoom||12});
  saveLocal(); updateWelcomeCities();
  if(supabaseReady) syncCities();
  toast('已切换到 '+name);
}

// ═══ MARKERS ═══
function createMkContent(m) {
  var cat=getCat(m.category), c=m.text_color||'#2C1810', fs=m.font_size||14;
  var fw=m.font_bold?'700':'400', sw=(m.stroke_width!==undefined?m.stroke_width:1);
  var strokeCSS=sw>0?'-webkit-text-stroke:'+sw+'px #000;':'';
  var name=m.name.length>10?m.name.slice(0,10)+'…':m.name;
  return '<div class="marker-wrap"><div class="mk-dot" style="background:'+c+'"></div><div class="mk-label" style="color:'+c+';font-size:'+fs+'px;font-weight:'+fw+';'+strokeCSS+'">'+cat.emoji+' '+esc(name)+'</div></div>';
}

function renderMarkers() {
  for(var k in mapMarkers) mapMarkers[k].remove();
  mapMarkers={};
  if(!amap||!currentCity) return;
  var cms=getCityMarkers();
  if(activeFilter!=='all') cms=cms.filter(function(m){return m.category===activeFilter;});
  cms.forEach(function(m){
    var mk=new AMap.Marker({ position:[m.lng,m.lat], content:createMkContent(m), offset:new AMap.Pixel(0,-8), zIndex:100 });
    mk.on('click',function(){ showPopup(m); });
    mk.setMap(amap); mapMarkers[m.id]=mk;
  });
  updateSheet();
}

function showPopup(m) {
  if(currentInfoWin){currentInfoWin.close();currentInfoWin=null;}
  var cat=getCat(m.category);
  var rb=isRouteMode?'<button onclick="window._addRoute(\''+m.id+'\')" style="padding:6px 14px;border-radius:14px;border:2px solid var(--sage);background:var(--cream);color:var(--sage);cursor:pointer;font-size:12px;margin-top:4px;">⟐ 加入路线</button>':'';
  var h='<div style="min-width:200px;padding:4px;"><div style="font-weight:700;font-size:16px;margin-bottom:4px;">'+cat.emoji+' '+esc(m.name)+'</div>'
    +(m.address?'<div style="font-size:12px;opacity:0.5;margin-bottom:4px;">'+esc(m.address)+'</div>':'')
    +(m.notes?'<div style="font-size:12px;margin-bottom:6px;font-style:italic;">'+esc(m.notes)+'</div>':'')
    +'<div style="display:flex;gap:6px;flex-wrap:wrap;"><button onclick="window._editMk(\''+m.id+'\')" style="padding:5px 14px;border-radius:14px;border:2px solid var(--wheat);background:var(--cream);cursor:pointer;font-size:12px;">✏️ 编辑</button><button onclick="window._delMk(\''+m.id+'\')" style="padding:5px 14px;border-radius:14px;border:2px solid var(--ember);background:var(--cream);color:var(--ember);cursor:pointer;font-size:12px;">🗑 删除</button>'+rb+'</div></div>';
  currentInfoWin=new AMap.InfoWindow({content:h,offset:new AMap.Pixel(0,-30),isCustom:true});
  currentInfoWin.open(amap,[m.lng,m.lat]);
}

function flyTo(id) {
  var m=gm(id); if(!m||!amap) return;
  amap.setZoomAndCenter(16,[m.lng,m.lat]);
  setTimeout(function(){if(mapMarkers[id])showPopup(m);},600);
}

// ═══ SHEET ═══
function updateSheet() {
  var cc=document.getElementById('sheetContent'), cnt=document.getElementById('sheetCount'), fc=document.getElementById('catFilters');
  var cms=getCityMarkers();
  if(activeFilter!=='all') cms=cms.filter(function(m){return m.category===activeFilter;});
  cnt.textContent=cms.length+' 个地点';
  var fh='<button class="cat-pill '+(activeFilter==='all'?'active':'')+'" data-f="all">全部</button>';
  for(var i=0;i<CATS.length;i++){ var c=CATS[i]; fh+='<button class="cat-pill '+(activeFilter===c.id?'active':'')+'" data-f="'+c.id+'">'+c.name+'</button>'; }
  fc.innerHTML=fh;
  var pills=fc.querySelectorAll('.cat-pill');
  for(var i=0;i<pills.length;i++){ pills[i].addEventListener('click',function(){ activeFilter=this.dataset.f; renderMarkers(); }); }
  if(cms.length===0){ cc.innerHTML='<div class="empty-state"><div class="empty-state-icon">📝</div><div class="empty-state-text">还没有标记哦</div></div>'; return; }
  var h='';
  for(var i=0;i<cms.length;i++){ var m=cms[i];
    var ra=isRouteMode?'<button class="mc-btn" onclick="event.stopPropagation();window._addRoute(\''+m.id+'\')" title="加入路线" style="color:var(--sage)">+</button>':'';
    h+='<div class="marker-card" data-id="'+m.id+'"><div class="mc-icon">'+getCat(m.category).emoji+'</div><div class="mc-info" onclick="flyTo(\''+m.id+'\')"><div class="mc-name">'+esc(m.name)+'</div>'+(m.address?'<div class="mc-addr">'+esc(m.address)+'</div>':'')+'</div><div class="mc-actions">'+ra+'<button class="mc-btn" onclick="event.stopPropagation();window._editMk(\''+m.id+'\')">✏️</button><button class="mc-btn danger" onclick="event.stopPropagation();window._delMk(\''+m.id+'\')">×</button></div></div>';
  }
  cc.innerHTML=h;
}

// ═══ WELCOME ═══
function updateWelcomeCities() {
  var grid=document.getElementById('wCityGrid'); if(!grid) return;
  var cities=getUniqueCities(), h='';
  for(var i=0;i<cities.length;i++){ var c=cities[i];
    h+='<button class="w-city-btn" data-name="'+esc(c.name)+'" data-lat="'+c.lat+'" data-lng="'+c.lng+'" data-zoom="'+(c.zoom||12)+'">'+esc(c.name)+'<span class="del" data-del="'+esc(c.name)+'">×</span></button>';
  }
  grid.innerHTML=h;
  var btns=grid.querySelectorAll('.w-city-btn');
  for(var i=0;i<btns.length;i++){ btns[i].addEventListener('click',function(e){
    if(e.target.classList.contains('del')){ e.stopPropagation(); removeCity(e.target.dataset.del); return; }
    document.getElementById('welcome').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
    enterCity(this.dataset.name, parseFloat(this.dataset.lat), parseFloat(this.dataset.lng), parseInt(this.dataset.zoom||12));
  });}
}

// ═══ CITY BAR ═══
function updateCityBar() {
  var bar=document.getElementById('cityBar'), cities=getUniqueCities(), h='';
  for(var i=0;i<cities.length;i++){ var c=cities[i], act=(currentCity&&currentCity.name===c.name);
    h+='<button class="city-pill'+(act?' active':'')+'" data-name="'+esc(c.name)+'" data-lat="'+c.lat+'" data-lng="'+c.lng+'" data-zoom="'+(c.zoom||12)+'">'+esc(c.name)+'<span class="cp-del" data-del="'+esc(c.name)+'">×</span></button>';
  }
  h+='<button class="city-pill cp-add" id="cpAdd">+ 添加</button>';
  bar.innerHTML=h;
  var pills=bar.querySelectorAll('.city-pill[data-name]');
  for(var i=0;i<pills.length;i++){ pills[i].addEventListener('click',function(e){
    if(e.target.classList.contains('cp-del')){ e.stopPropagation(); removeCity(e.target.dataset.del); return; }
    enterCity(this.dataset.name, parseFloat(this.dataset.lat), parseFloat(this.dataset.lng), parseInt(this.dataset.zoom||12));
  });}
  var ab=document.getElementById('cpAdd'); if(ab) ab.addEventListener('click',showAddCityModal);
}

function removeCity(name) {
  if(!confirm('确定移除「'+name+'」吗？（标记不会被删除）')) return;
  userCities=userCities.filter(function(c){return c.name!==name;});
  if(currentCity&&currentCity.name===name){currentCity=null; if(amap){amap.destroy();amap=null;}}
  saveLocal(); updateWelcomeCities(); updateCityBar();
  if(supabaseReady) deleteRemoteCity(name);
  toast('已移除：'+name);
}

// ═══ ADD CITY ═══
function showAddCityModal() {
  showModal('🏙️ 添加城市','<div class="modal-field"><div class="modal-label">城市名称</div><input class="modal-input" id="mCityName" placeholder="例如：南京"></div><div class="modal-btns"><button class="modal-btn secondary" onclick="window._closeM()">取消</button><button class="modal-btn primary" id="mConfirmCity">定位城市</button></div>');
  document.getElementById('mConfirmCity').addEventListener('click', function(){
    var name=document.getElementById('mCityName').value.trim(); if(!name){toast('请输入城市名');return;}
    goCity(name, function(success){ if(success){ saveLocal(); updateWelcomeCities(); closeModal(); } });
  });
}

// ═══ CITY LOOKUP (shared) ═══
function goCity(name, cb) {
  // 1) check known cities
  var cities=getUniqueCities();
  for(var i=0;i<cities.length;i++){ if(cities[i].name===name){
    document.getElementById('welcome').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
    enterCity(name, cities[i].lat, cities[i].lng, cities[i].zoom||12);
    if(cb) cb(true); return;
  }}
  // 2) AMap DistrictSearch
  var ds=new AMap.DistrictSearch({level:'city',extensions:'base',subdistrict:0});
  ds.search(name, function(status, result) {
    if(status==='complete'&&result.districtList&&result.districtList.length>0){
      var center=result.districtList[0].center;
      document.getElementById('welcome').classList.add('hidden');
      document.getElementById('app').classList.add('visible');
      enterCity(name, center.lat, center.lng, 12);
      if(cb) cb(true);
    } else {
      toast('找不到这个城市，换个写法试试');
      if(cb) cb(false);
    }
  });
}

// ═══ SEARCH ═══
var searchTimeout=null;
function doSearch(query) {
  var resEl=document.getElementById('searchResults');
  if(!query||query.length<1){resEl.classList.remove('active');return;}
  resEl.innerHTML='<div class="search-loading">🔍 搜索中…</div>'; resEl.classList.add('active');
  if(!amap||!currentCity){resEl.innerHTML='<div class="search-loading">请先选择一个城市</div>';return;}
  placeSearch.setCity(currentCity.name); placeSearch.setCityLimit(true);
  placeSearch.search(query, function(status, result) {
    if(status==='complete'&&result.poiList){
      var pois=result.poiList.pois||[];
      if(pois.length===0){resEl.innerHTML='<div class="search-loading">没找到结果，换个关键词试试</div>';return;}
      var h='';
      for(var i=0;i<pois.length;i++){ var p=pois[i], tn=p.type?p.type.split(';')[0]:'';
        h+='<div class="search-item" data-lat="'+p.location.lat+'" data-lng="'+p.location.lng+'" data-name="'+esc(p.name)+'" data-addr="'+esc(p.address||'')+'" data-type="'+esc(tn||'')+'"><span class="s-icon">'+guessEmoji(p.type||'')+'</span><span class="s-info"><span class="s-name">'+esc(p.name)+'</span><span class="s-addr">'+esc(p.address||'')+'</span></span></div>';
      }
      resEl.innerHTML=h;
      var items=resEl.querySelectorAll('.search-item');
      for(var i=0;i<items.length;i++){ items[i].addEventListener('click',function(){
        var lat=parseFloat(this.dataset.lat), lng=parseFloat(this.dataset.lng);

function guessEmoji(t){ if(!t)return'📍'; t=t.toLowerCase(); if(t.indexOf('餐饮')>=0||t.indexOf('餐厅')>=0||t.indexOf('美食')>=0)return'🍜'; if(t.indexOf('咖啡')>=0||t.indexOf('饮品')>=0)return'☕'; if(t.indexOf('面包')>=0||t.indexOf('糕点')>=0)return'🥐'; if(t.indexOf('酒吧')>=0||t.indexOf('酒馆')>=0)return'🍸'; if(t.indexOf('甜品')>=0||t.indexOf('冰淇淋')>=0)return'🍰'; if(t.indexOf('市场')>=0||t.indexOf('超市')>=0)return'🛒'; if(t.indexOf('景点')>=0||t.indexOf('公园')>=0)return'🏛️'; if(t.indexOf('购物')>=0||t.indexOf('商店')>=0)return'🛍️'; return'⭐'; }

// ═══ CITY BOUNDARY ═══
function drawCityBoundary(cityName) {
  clearCityBoundary(); if(!amap) return;
  var ds=new AMap.DistrictSearch({level:'city',extensions:'all',subdistrict:0});
  ds.search(cityName, function(status, result) {
    if(status==='complete'&&result.districtList&&result.districtList.length>0){
      var dist=result.districtList[0];
      if(dist.boundaries&&dist.boundaries.length>0){
        var paths=[];
        for(var i=0;i<dist.boundaries.length;i++){
          var pts=dist.boundaries[i].split(';'), path=[];
          for(var j=0;j<pts.length;j++){ if(!pts[j])continue; var xy=pts[j].split(','); path.push([parseFloat(xy[0]),parseFloat(xy[1])]); }
          if(path.length>=3) paths.push(path);
        }
        if(paths.length>0){
          cityPolygon=new AMap.Polygon({path:paths[0],strokeColor:'#3388FF',strokeWeight:3,strokeOpacity:0.8,strokeStyle:'dashed',fillColor:'#3388FF',fillOpacity:0.06,strokeDasharray:[12,8]});
          cityPolygon.setMap(amap); amap.setFitView(null,false,[60,60,60,60]);
        }
      }
    }
  });
}
function clearCityBoundary() { if(cityPolygon){cityPolygon.setMap(null);cityPolygon=null;} }

function updateRoutePanel() {
  var list=document.getElementById('routeList'), panel=document.getElementById('routePanel');
  if(routeStops.length===0){ if(!isRouteMode)panel.classList.remove('visible'); list.innerHTML='<div style="font-size:11px;opacity:0.4;">点击标记的 + 号添加途经点</div>'; clearRouteLine(); return; }
  panel.classList.add('visible'); var h='';
  for(var i=0;i<routeStops.length;i++){ var m=gm(routeStops[i]); h+='<div class="route-panel-item" onclick="flyTo(\''+routeStops[i]+'\')"><span style="color:var(--clay);font-weight:700;min-width:16px;">'+(i+1)+'</span><span>'+esc(m?m.name:'(已删除)')+'</span></div>'; }
  list.innerHTML=h;

function planRoute() {
  if(routeStops.length<2){toast('至少需要2个地点');return;}
  var pts=[]; for(var i=0;i<routeStops.length;i++){var m=gm(routeStops[i]);if(m)pts.push(m);}
  if(pts.length<2){toast('有效地点不足');return;}
  toast('路线计算中…'); clearRouteLine();
  var origin=new AMap.LngLat(pts[0].lng,pts[0].lat), dest=new AMap.LngLat(pts[pts.length-1].lng,pts[pts.length-1].lat);
  var waypoints=[]; for(var i=1;i<pts.length-1;i++) waypoints.push(new AMap.LngLat(pts[i].lng,pts[i].lat));
  var sf; if(routeMode==='driving') sf=new AMap.Driving({policy:AMap.DrivingPolicy.LEAST_TIME,autoFitView:false}); else if(routeMode==='walking') sf=new AMap.Walking({autoFitView:false}); else sf=new AMap.Riding({autoFitView:false});
  sf.search(origin,dest,{waypoints:waypoints},function(status,result){
    if(status==='complete'&&result.routes&&result.routes[0]){
      var route=result.routes[0], dist=(route.distance/1000).toFixed(1), dur=Math.round(route.duration/60), allPts=[];
      for(var i=0;i<route.steps.length;i++){ var step=route.steps[i]; if(step.path) for(var j=0;j<step.path.length;j++) allPts.push([step.path[j].lng,step.path[j].lat]); }
      routePolyline=new AMap.Polyline({path:allPts,strokeColor:'#7C9A6B',strokeWeight:5,strokeOpacity:0.7,strokeStyle:'dashed',strokeDasharray:[10,6]});
      routePolyline.setMap(amap);
      for(var i=0;i<pts.length;i++){ var mk=new AMap.Marker({position:[pts[i].lng,pts[i].lat],content:'<div style="background:var(--sage);color:#fff;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.25);">'+(i+1)+'</div>',offset:new AMap.Pixel(-13,-13),zIndex:200}); mk.setMap(amap); routeMarkers.push(mk); }
      amap.setFitView(null,false,[80,80,160,80]);
      document.getElementById('routeInfo').textContent='🚗 '+dist+'公里 · ⏱ '+dur+'分钟'; document.getElementById('routeInfo').classList.add('visible');
      toast('路线规划完成：'+dist+'km，约'+dur+'分钟');
    }else{toast('路线规划失败，请调整地点顺序');}
  });
}
function clearRouteLine() { if(routePolyline){routePolyline.setMap(null);routePolyline=null;} for(var i=0;i<routeMarkers.length;i++)routeMarkers[i].remove(); routeMarkers=[]; document.getElementById('routeInfo').classList.remove('visible'); }

// ═══ SUPABASE ═══
function initSupabase(){
  try{
    supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
    return supabase.from('markers').select('id').limit(1).then(function(r){
      if(r.error){supabaseReady=false;updateSyncDot('error');return false;}
      supabaseReady=true;updateSyncDot('ok');subscribeRealtime();return true;
    }).catch(function(){supabaseReady=false;updateSyncDot('error');return false;});
  }catch(e){supabaseReady=false;updateSyncDot('error');return Promise.resolve(false);}
}
function subscribeRealtime(){ if(!supabaseReady)return; supabase.channel('qiumi-realtime').on('postgres_changes',{event:'*',schema:'public',table:'markers'},hRM).on('postgres_changes',{event:'*',schema:'public',table:'user_cities'},hRC).subscribe(); }
function hRM(p){ var id=p.new?p.new.id:p.old.id; if(pendingSync[id]){delete pendingSync[id];return;} if(p.eventType==='DELETE'){markersData=markersData.filter(function(m){return m.id!==id;});routeStops=routeStops.filter(function(s){return s!==id;});}else{var m=p.new,idx=-1; for(var i=0;i<markersData.length;i++){if(markersData[i].id===m.id){idx=i;break;}} if(idx>=0)markersData[idx]=m;else markersData.push(m);} saveLocal(); if(amap&&currentCity){renderMarkers();updateRoutePanel();} updateWelcomeCities(); }
function hRC(p){ if(pendingSync['_cities_']){delete pendingSync['_cities_'];return;} if(p.eventType==='DELETE'){userCities=userCities.filter(function(c){return c.name!==p.old.name;});}else{var c=p.new,idx=-1; for(var i=0;i<userCities.length;i++){if(userCities[i].name===c.name){idx=i;break;}} if(idx>=0)userCities[idx]=c;else userCities.push(c);} saveLocal();updateWelcomeCities();updateCityBar(); }
function updateSyncDot(s){var d=document.getElementById('syncDot');d.className='sync-dot';if(s==='syncing')d.classList.add('syncing');if(s==='error')d.classList.add('error');}
function syncAllToSupabase(){ if(!supabaseReady)return;updateSyncDot('syncing'); var ps=[]; for(var i=0;i<markersData.length;i++){ var m=markersData[i]; pendingSync[m.id]=true; ps.push(supabase.from('markers').upsert(m,{onConflict:'id'})); } pendingSync['_cities_']=true; ps.push(supabase.from('user_cities').upsert(userCities,{onConflict:'name'})); return Promise.all(ps).then(function(){updateSyncDot('ok');}).catch(function(){updateSyncDot('error');}); }
function syncMarker(m){ if(!supabaseReady)return;updateSyncDot('syncing');pendingSync[m.id]=true; supabase.from('markers').upsert(m,{onConflict:'id'}).then(function(){updateSyncDot('ok');}).catch(function(){updateSyncDot('error');}); }
function deleteMarkerRemote(id){ if(!supabaseReady)return;pendingSync[id]=true; supabase.from('markers').delete().eq('id',id); }
function syncCities(){ if(!supabaseReady)return;pendingSync['_cities_']=true; supabase.from('user_cities').upsert(userCities,{onConflict:'name'}); }
function deleteRemoteCity(name){ if(!supabaseReady)return; supabase.from('user_cities').delete().eq('name',name); }
function loadFromSupabase(){ if(!supabaseReady)return Promise.resolve(false); return Promise.all([supabase.from('markers').select('*'),supabase.from('user_cities').select('*')]).then(function(r){ if(r[0].data&&r[0].data.length>0)markersData=r[0].data; if(r[1].data&&r[1].data.length>0)userCities=r[1].data; if(userCities.length===0)userCities=DEF_CITIES.map(function(c){return {name:c.name,lat:c.lat,lng:c.lng,zoom:c.zoom};}); return true; }).catch(function(){return false;}); }

// ═══ EVENTS ═══
function bindEvents(){
  var si=document.getElementById('searchInput'), sc=document.getElementById('searchClear');
  si.addEventListener('input',function(){ sc.classList.toggle('visible',si.value.length>0); clearTimeout(searchTimeout); searchTimeout=setTimeout(function(){doSearch(si.value.trim());},350); });
  si.addEventListener('focus',function(){if(si.value.trim().length>=1)document.getElementById('searchResults').classList.add('active');});
  si.addEventListener('keydown',function(e){if(e.key==='Enter'){clearTimeout(searchTimeout);doSearch(si.value.trim());}});
  sc.addEventListener('click',function(){si.value='';sc.classList.remove('visible');document.getElementById('searchResults').classList.remove('active');});
  document.getElementById('searchBtn').addEventListener('click',function(){doSearch(si.value.trim());});
  document.addEventListener('click',function(e){if(!document.getElementById('searchWrap').contains(e.target))document.getElementById('searchResults').classList.remove('active');});

  document.getElementById('btnAdd').addEventListener('click',function(){ if(!amap||!currentCity){toast('请先选择城市');return;} amap._pendingAdd=true; toast('在地图上点击要标记的位置'); });
  document.getElementById('btnRoute').addEventListener('click',function(){ isRouteMode=!isRouteMode; var b=document.getElementById('btnRoute'); b.classList.toggle('active',isRouteMode); if(isRouteMode)document.getElementById('routePanel').classList.add('visible'); else if(routeStops.length===0)document.getElementById('routePanel').classList.remove('visible'); renderMarkers();updateRoutePanel(); if(currentInfoWin){currentInfoWin.close();currentInfoWin=null;} });
  document.getElementById('routeModeTabs').addEventListener('click',function(e){ if(e.target.classList.contains('route-mode-tab')){ var tabs=document.querySelectorAll('.route-mode-tab'); for(var i=0;i<tabs.length;i++)tabs[i].classList.remove('active'); e.target.classList.add('active'); routeMode=e.target.dataset.mode; } });
  document.getElementById('btnData').addEventListener('click',function(){ document.getElementById('dataPanel').classList.toggle('visible'); });
  document.getElementById('btnExport').addEventListener('click',exportData);
  document.getElementById('btnImport').addEventListener('click',function(){document.getElementById('importFile').click();});
  document.getElementById('importFile').addEventListener('change',function(e){if(e.target.files[0])importFile(e.target.files[0]);});
  document.getElementById('btnShareCode').addEventListener('click',function(){document.getElementById('dataPanel').classList.remove('visible');generateShareCode();});
  document.getElementById('btnImportCode').addEventListener('click',function(){document.getElementById('dataPanel').classList.remove('visible');showImportCodeModal();});
  document.getElementById('btnClearCity').addEventListener('click',function(){document.getElementById('dataPanel').classList.remove('visible');clearCityMarkers();});
  document.getElementById('btnPlanRoute').addEventListener('click',planRoute);
  document.getElementById('btnClearRoute').addEventListener('click',function(){routeStops=[];clearRouteLine();updateRoutePanel();renderMarkers();toast('路线已清空');});
  document.getElementById('btnSync').addEventListener('click',showSyncModal);

  document.getElementById('topLogo').addEventListener('click',function(){
    document.getElementById('welcome').classList.remove('hidden'); document.getElementById('app').classList.remove('visible');
    currentCity=null; saveLocal(); if(amap){amap.destroy();amap=null;} clearCityBoundary(); updateWelcomeCities();
  });

  // CUSTOM CITY "出发" - unified lookup
  document.getElementById('wGoBtn').addEventListener('click',function(){
    var name=document.getElementById('wCustomCity').value.trim();
    if(!name){toast('请输入城市名');return;}
    goCity(name);
  });
  document.getElementById('wCustomCity').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('wGoBtn').click();});

  document.addEventListener('keydown',function(e){if(e.key==='Escape'){closeModal();document.getElementById('searchResults').classList.remove('active');document.getElementById('dataPanel').classList.remove('visible');}});
  window.addEventListener('resize',function(){if(amap)amap.resize();});

  // Sheet
  var sheet=document.getElementById('bottomSheet');
  document.getElementById('sheetHandle').addEventListener('click',function(){sheetExpanded=!sheetExpanded;sheet.classList.toggle('collapsed',!sheetExpanded);});
  var ty=0; sheet.addEventListener('touchstart',function(e){ty=e.touches[0].clientY;});
  sheet.addEventListener('touchend',function(e){var d=e.changedTouches[0].clientY-ty; if(d>50&&sheetExpanded){sheetExpanded=false;sheet.classList.add('collapsed');}else if(d<-50&&!sheetExpanded){sheetExpanded=true;sheet.classList.remove('collapsed');}});
}

// ═══ GLOBAL ═══
window._addRoute=function(id){var idx=routeStops.indexOf(id);if(idx>=0){routeStops.splice(idx,1);toast('已从路线移除');}else{routeStops.push(id);toast('已加入路线');}updateRoutePanel();renderMarkers();};
window._editMk=function(id){if(currentInfoWin){currentInfoWin.close();currentInfoWin=null;}editMarker(id);};
window._delMk=function(id){if(currentInfoWin){currentInfoWin.close();currentInfoWin=null;}deleteMarker(id);};
window._closeM=closeModal;

// ═══ INIT ═══
function init(){
  loadLocal();
  bindEvents();
  updateWelcomeCities();
  initSupabase().then(function(ok){
    if(ok) return loadFromSupabase().then(function(){updateWelcomeCities();updateCityBar(); if(currentCity){renderMarkers();} });
  });
  if(currentCity){
    document.getElementById('welcome').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
    initAmap(currentCity.lat, currentCity.lng, currentCity.zoom||12);
    renderMarkers(); updateCityBar();
    drawCityBoundary(currentCity.name);
  }
}
function waitForAMap(cb){ if(window.AMap&&AMap.Map){cb();return;} setTimeout(function(){waitForAMap(cb);},200); }
waitForAMap(init);
})();
</script>
</body>
